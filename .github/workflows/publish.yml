name: Publish to crates.io

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify packaging
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: Validate tag matches workspace version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match workspace version $VERSION"
            exit 1
          fi

      - name: Verify all crates package correctly
        run: |
          for crate in morok-dtype morok-macros morok-ir morok-device morok-schedule \
                       morok-codegen morok-runtime morok-tensor morok-onnx; do
            echo "=== $crate ==="
            nix develop --command cargo package -p "$crate"
          done

  publish:
    name: Publish crates
    needs: verify
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          wait_for_crate() {
            local crate="$1"
            local version="$2"
            local timeout=300
            local elapsed=0
            echo "Waiting for $crate@$version to appear on crates.io..."
            while [ $elapsed -lt $timeout ]; do
              if curl -sf "https://crates.io/api/v1/crates/$crate/$version" > /dev/null 2>&1; then
                echo "$crate@$version is available"
                return 0
              fi
              sleep 15
              elapsed=$((elapsed + 15))
            done
            echo "::error::Timed out waiting for $crate@$version"
            return 1
          }

          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')

          # L0: no internal deps
          nix develop --command cargo publish -p morok-dtype --no-verify &
          nix develop --command cargo publish -p morok-macros --no-verify &
          wait
          wait_for_crate morok-dtype "$VERSION"
          wait_for_crate morok-macros "$VERSION"

          # L1
          nix develop --command cargo publish -p morok-ir --no-verify
          wait_for_crate morok-ir "$VERSION"

          # L2
          nix develop --command cargo publish -p morok-device --no-verify
          wait_for_crate morok-device "$VERSION"

          # L3
          nix develop --command cargo publish -p morok-schedule --no-verify
          wait_for_crate morok-schedule "$VERSION"

          # L4
          nix develop --command cargo publish -p morok-codegen --no-verify
          wait_for_crate morok-codegen "$VERSION"

          # L5
          nix develop --command cargo publish -p morok-runtime --no-verify
          wait_for_crate morok-runtime "$VERSION"

          # L6
          nix develop --command cargo publish -p morok-tensor --no-verify
          wait_for_crate morok-tensor "$VERSION"

          # L7
          nix develop --command cargo publish -p morok-onnx --no-verify
          echo "All crates published successfully!"

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Detect pre-release and build crates.io links
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"

          if echo "$VERSION" | grep -qE '(alpha|beta|rc)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          CRATES="morok-dtype morok-macros morok-ir morok-device morok-schedule morok-codegen morok-runtime morok-tensor morok-onnx"
          {
            echo "links<<EOF"
            echo "## Crates"
            echo ""
            for crate in $CRATES; do
              echo "- [\`$crate\`](https://crates.io/crates/$crate/$VERSION)"
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          append_body: true
          body: ${{ steps.meta.outputs.links }}
